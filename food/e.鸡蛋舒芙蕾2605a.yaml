name: 鸡蛋舒芙蕾2605a 
amount: 129.5
unit: g
food:
  - name: 鸡蛋 
    amount: 141.0
    unit: g
  - name: 十倍零卡糖
    amount: 22.5
    unit: g
  - name: 甘青精制小麦粉
    amount: 8.0
    unit: g
log:
  - 蛋白+十倍零卡糖+白醋一滴，高速打发到泡沫足够硬。
  - 蛋黄打散后和小麦粉搅匀，一起倒入蛋白泡沫中，搅拌均匀。
  - 烤箱上下火、中层160°C+8分钟、150°C+27分钟。第20分钟取出割十字切口。
  - 空锡碗3.0g，空骨瓷碗145.0g。
  - 烤好带锡碗重87.5g，带骨瓷碗种190.0g，蛋糕净重=84.5g+45.0g=129.5g。
comment:
  - 甜度合适。
  - 上半部分蓬松、口感很好，下半部分没有泡沫，是无水蛋羹的口感。
  - 只能做一两厘米厚的蛋糕皮，卷起来吃。