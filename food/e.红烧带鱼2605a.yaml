name: 红烧带鱼2605a
amount: 323.5
unit: g
food:
  - name: 盛林舟山七去带鱼
    amount: 411.0
    unit: g
  - name: 姜
    amount: 60.0
    unit: g
  - name: 楚郡味豆瓣酱
    amount: 31.0
    unit: g
log:
  - 姜片垫底，摆放七去带鱼，用料酒和豆瓣酱混合液覆盖到鱼肉一半。
  - 全部食材在高压锅煮30分钟。
  - 熟肉和汤汁移到密封罐冷却，浸泡着放到保鲜层待用。
comment:
  - 只计算熟带鱼肉，姜片大概按比例搭配。
  - 足够软烂，鱼骨可以嚼碎吃下去。
  - 偏咸，下次用15克豆瓣酱试试。
  - 汤汁略多，下次开始时比姜片高一厘米试试。