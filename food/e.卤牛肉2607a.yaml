log: |
  - 实际使用的是蓝稻雪龙和牛的筋头巴脑。
  - 实际使用的是酱油膏11.0g，按豆瓣酱的3倍折算。
  - 高压锅加生牛肉、加水、酱油膏、料酒。
  - 高压锅30分钟档。肉和卤汁移到密封罐冷却，浸泡着放到保鲜层待用。
comment: |
  - 足够软烂。
  - 肌腱30分钟，没有肌腱的纯肌肉26分钟。