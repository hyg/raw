log:
  - 香蕉、鸡蛋混合，用手捏碎，打蛋器打匀。
  - 奶粉加水200.0g，加零卡糖，加入香蕉鸡蛋液中全部搅拌均匀。
  - 加燕麦，稍微搅匀，倒入锡碗。
  - 烤箱上下火、不预热、中层+下层、230°C+5分钟、160°C+30分钟。
  - 下层换上上层、180°C+5分钟。
  - 4个空锡碗12.5，烤好带锡碗重303.0g,317.0g,353.5g,386.0g，共1359.5g。蛋糕净重1347.0g。
comment:
  - 甜度太高了，下次30克零卡糖。
  - 中层的表面还好，水分保留更多；下层的表面没有烤焦、水分失去更多。
  - 下次换层后170°+10分钟，或者在前面的30分钟里换层。