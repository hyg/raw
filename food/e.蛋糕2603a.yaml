log: |
  - 面糊1=蛋糕粉+鸡蛋+水18.0g，低速打1分钟，高速打发5~10分钟。
  - 面糊2=面糊1+橄榄油，打发均匀。
  - 锅胆抹油，倒入面糊2，14分钟档。
comment: |
  - 唐宁锅一直E3报警，重启三次勉强做熟。下次做两份或者用烤箱。
  - 降温后很容易脱模，用木勺可以轻松挑出。