log: |
  - 酵母液 = 鲜酵母9.5克 + 水
  - 面团1 = 小象全麦粉450.0g + 酵母液254.5g（含水245.0g），搅匀、揉匀。
  - 面团1盖湿盖在蒸箱中发酵60分钟。
  - 面团2 = 面团1 + 全麦粉30.0克，排气、揉匀。面团2重量733.5g，分为8个馒头胚各91.5~92.0g、整型。
