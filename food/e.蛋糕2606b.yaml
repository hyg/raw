log: |
  - 面糊1=面粉+鸡蛋+水20.0g，低速打1分钟，高速打发5~10分钟。
  - 面糊2=面糊1+白砂糖+泡打粉3.0g+橄榄油24.5g，打发均匀。
  - 饭盒3.0g抹油0.5g，倒入面糊2，烤箱上下火、中层190°C+20分钟。
  - 烤好带饭盒重218.5克，蛋糕净重215.5克。
comment: |
  - 大颗粒的红糖很难溶解，需要先溶成红糖水在面糊1加入。白砂糖可以在面糊2再加入。
  - 表面合适，中间鼓起、边缘高度不够。最底下一层没有发开，下次160°C+25分钟。
  - 口感有点硬，吃起来有点涩。